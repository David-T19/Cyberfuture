<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Formulario de registro</title>
 
</head>
<body>

  <div class="w-25 mx-auto border p-4 mt-5">
    <form>
     <div class="mb-3">
        <label for="Id" class="form-label">IdCurso</label>
        <input type="number" class="form-control" id="Id" required>
      </div>

   <div class="mb-3">
        <label for="IdF" class="form-label">IdFactura</label>
        <input type="number" class="form-control" id="IdF" required>
      </div>
        
   <div class="mb-3">
        <label for="Detalle" class="form-label">Detalle</label>
        <input type="text" class="form-control" id="Detalle" required >
      </div>

    
      <button type="button" id="registrar" class="btn btn-success">Registrar</button>
      <a href="index.html" class="btn btn-primary ms-3">Regresar</a>
    </form>
  </div>

  <script src="../js/postContiene.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
