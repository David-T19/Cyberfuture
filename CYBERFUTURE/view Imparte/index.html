<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet"type="text/css" href="../css/styles.css"><!--CSS--> 
    <title>Tematica</title>
   
</head>

<body>
    <div class="container mt-4">
        <h1 class="text-center mb-4">Temas</h1>
        
        <div id="connectionStatus" class="connection-status status-offline mb-3">
            🔴 Sin conexión con el servidor
        </div>

        <div id="offlineMessage" class="alert alert-warning" style="display: none;">
            <strong>Modo offline:</strong> No se puede conectar con el servidor. Mostrando datos de ejemplo.
            <button id="retryConnection" class="btn btn-sm btn-outline-warning ms-2">Reintentar</button>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <a href="../Main/Index.html" class="btn btn-info btn-sm">↩️ Regresar</a>
                <h5 class="mb-0">Temas</h5>
                <div> 
                    <a href="registrarContiene.html" class="btn btn-primary btn-sm">➕ Organizar un nuevo tema</a>
                    <button id="debugBtn" class="btn btn-outline-info btn-sm ms-2">🔍 Debug</button>
                </div>
            </div>
            
            <div class="card-body">
                <div id="loading" class="text-center" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-2">Conectando con el servidor...</p>
                </div>

                <div id="debugInfo" class="debug-info" style="display: none;">
                    <strong>Información de Debug:</strong>
                    <div id="debugContent"></div>
                </div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                               
                                <th>IdInstructor</th>
                                <th>IdCurso</th>
                                <th>Tematica</th>
                                <th width="140">Acciones
                                </th>
                            
                            </tr>
                        </thead>
                        <tbody id="cuerpoTabla"></tbody><!--Data-->
                        
                    </table>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3">
                    <button class="btn btn-outline-primary" id="paginaAnterior" disabled>
                        ← Anterior
                    </button>
                    <span id="infoPagina" class="text-muted">Página 1 de 1</span>
                    <button class="btn btn-outline-primary" id="paginaSiguiente" disabled>
                        Siguiente →
                    </button>
                </div>
            </div>
        </div>
    </div>

     <script src="../js/getImparte.js"></script>
</body>
</html>
