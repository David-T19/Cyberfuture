<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Edición</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="w-25 mx-auto border p-4 mt-5 shadow rounded-3">
    <form>
      <h5 class="text-center mb-3">Formulario de Actualización</h5>
      <hr>

      <div class="mb-3">
        <label for="Id" class="form-label">IdInstructor</label>
        <input type="number" class="form-control" id="Id" readonly>
      </div>

   <div class="mb-3">
        <label for="IdC" class="form-label">IdCurso</label>
        <input type="number" class="form-control" id="IdC" readonly>
      </div>
        
   <div class="mb-3">
        <label for="Tematica" class="form-label">Tematica</label>
        <input type="text" class="form-control" id="Tematica" required >
      </div>
        


      <div class="text-center">
        <button type="button" id="editar" class="btn btn-success px-4">Actualizar</button>
        <a href="index.html" class="btn btn-secondary ms-3 px-4">Regresar</a>
      </div>
    </form>
  </div>

  <script src="../js/putImparte.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
