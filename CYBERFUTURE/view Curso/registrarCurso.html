<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Formulario de registro</title>
 
</head>
<body>

  <div class="w-25 mx-auto border p-4 mt-5">
    <form>
      <div>
        <h5 class="text-center">Formulario de Creacion de Cursos</h5>
        <hr>
      </div>

   
      <div class="mb-3">
        <label for="Id" class="form-label">IdCurso</label>
        <input type="number" class="form-control" id="Id" required>
      </div>

        <div class="mb-3">
        <label for="Nombre" class="form-label">Nombre del curso</label>
        <input type="text" class="form-control" id="Nombre" required>
      </div>

    <div class="mb-3">
        <label for="Costo" class="form-label">Costo</label>
        <input type="number" class="form-control" id="Costo">
      </div>

      <div class="mb-3">
        <label for="Duracion" class="form-label">Duracion</label>
        <input type="number" class="form-control" id="Duracion" required>
      </div>

        <div class="mb-3">
        <label for="Fecha_Inicial" class="form-label">Fecha de Inicio</label>
        <input type="datetime-local" class="form-control" id="Fecha_Inicial">
      </div>
       
      <div class="mb-3">
        <label for="Fecha_Fin" class="form-label">Fecha de terminacion</label>
        <input type="datetime-local" class="form-control" id="Fecha_Fin">
      </div>
       

      



      <button type="button" id="registrar" class="btn btn-success">Registrar</button>
      <a href="index.html" class="btn btn-primary ms-3">Regresar</a>
    </form>
  </div>

  <script src="../js/postCursos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
