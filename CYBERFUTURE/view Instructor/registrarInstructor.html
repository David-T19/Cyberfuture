<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Formulario de registro</title>
 
</head>
<body>

  <div class="w-25 mx-auto border p-4 mt-5">
    <form>
      <div>
        <h5 class="text-center">Formulario de registro de Instructores</h5>
        <hr>
      </div>

      <div class="mb-3">
        <label for="Id" class="form-label">Id</label>
        <input type="Number" class="form-control" id="Id">
      </div>

      <div class="mb-3">
        <label for="Nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="Nombre">
      </div>

      <div class="mb-3">
        <label for="Apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="Apellido">
      </div>

      <div class="mb-3">
        <label for="Edad" class="form-label">Edad</label>
        <input type="text" class="form-control" id="Edad">
      </div>

      <div class="mb-3">
        <label for="Telefono" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="Telefono">
      </div>



      <button type="button" id="registrar" class="btn btn-success">Registrar</button>
      <a href="index.html" class="btn btn-primary ms-3">Regresar</a>
    </form>
  </div>

  <script src="../js/postInstructores.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
