<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Edición</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="w-25 mx-auto border p-4 mt-5 shadow rounded-3">
    <form>
      <h5 class="text-center mb-3">Formulario de Actualización</h5>
      <hr>

      <div class="mb-3">
        <label for="Id" class="form-label">Id Practica</label>
        <input type="text" class="form-control" id="Id" readonly>
      </div>
   <div class="mb-3">
        <label for="No_Horas" class="form-label">No. Horas</label>
        <input type="number" class="form-control" id="No_Horas">
      </div>

      <div class="mb-3">
        <label for="Fecha_Inicio" class="form-label">Fecha de Inicio</label>
        <input type="datetime-local" class="form-control" id="Fecha_Inicio">
      </div>

      <div class="mb-3">
        <label for="Fecha_Final" class="form-label">Fecha de Terminacion</label>
        <input type="datetime-local" class="form-control" id="Fecha_Final">
      </div>

      

           <div class="text-center">
        <button type="button" id="editar" class="btn btn-success px-4">Actualizar</button>
        <a href="index.html" class="btn btn-secondary ms-3 px-4">Regresar</a>
      </div>
    </form>
  </div>

  <script src="../js/putPracticas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
