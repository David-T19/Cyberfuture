<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Formulario de registro</title>
 
</head>
<body>

  <div class="w-25 mx-auto border p-4 mt-5">
    <form>
      <div>
        <h5 class="text-center">Formulario de registro de Practicas Empresariales</h5>
        <hr>
      </div>

      <div class="mb-3">
        <label for="Id" class="form-label">Id</label>
        <input type="Number" class="form-control" id="Id">
      </div>

      <div class="mb-3">
        <label for="No_Horas" class="form-label">No. Horas</label>
        <input type="number" class="form-control" id="No_Horas">
      </div>

      <div class="mb-3">
        <label for="Fecha_Inicio" class="form-label">Fecha de Inicio</label>
        <input type="date" class="form-control" id="Fecha_Inicio">
      </div>

      <div class="mb-3">
        <label for="Fecha_Final" class="form-label">Fecha de Terminacion</label>
        <input type="date"" class="form-control" id="Fecha_Final">
      </div>

      
      <button type="button" id="registrar" class="btn btn-success">Registrar</button>
      <a href="index.html" class="btn btn-primary ms-3">Regresar</a>
    </form>
  </div>

  <script src="../js/postPracticas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
