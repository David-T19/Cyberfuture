<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Edición</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="w-25 mx-auto border p-4 mt-5 shadow rounded-3">
    <form>
      <h5 class="text-center mb-3">Formulario de Actualización</h5>
      <hr>

      <div class="mb-3">
        <label for="Id" class="form-label">Id Alumno</label>
        <input type="text" class="form-control" id="Id" readonly>
      </div>

      <div class="mb-3">
        <label for="Nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="Nombre" required>
      </div>

      <div class="mb-3">
        <label for="Apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="Apellido" required>
      </div>

      <div class="mb-3">
        <label for="Edad" class="form-label">Edad</label>
        <input type="number" class="form-control" id="Edad" min="0">
      </div>

      <div class="mb-3">
        <label for="Telefono" class="form-label">Teléfono</label>
        <input type="text" class="form-control" id="Telefono">
      </div>
       
      <div class="mb-3">
        <label for="Correo" class="form-label">Correo</label>
        <input type="text" class="form-control" id="Correo">
      </div>
       
        <div class="mb-3">
        <label for="Practica" class="form-label">Practica</label>
        <input type="number" class="form-control" id="Practica">
      </div>

     

      <div class="text-center">
        <button type="button" id="editar" class="btn btn-success px-4">Actualizar</button>
        <a href="index.html" class="btn btn-secondary ms-3 px-4">Regresar</a>
      </div>
    </form>
  </div>

  <script src="../js/putAlumnos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
