<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Formulario de registro</title>
 
</head>
<body>

  <div class="w-25 mx-auto border p-4 mt-5">
    <form>
      <div>
        <h5 class="text-center">Formulario de Creacion de Facturas</h5>
        <hr>
      </div>

   
      <div class="mb-3">
        <label for="Id" class="form-label">IdFactura</label>
        <input type="number" class="form-control" id="Id" required>
      </div>

      <div class="mb-3">
        <label for="Estado" class="form-label">Estado</label>
        <input type="text" class="form-control" id="Estado" required>
      </div>

      <div class="mb-3">
        <label for="Subtotal" class="form-label">Subtotal</label>
        <input type="number" class="form-control" id="Subtotal" required>
      </div>

      <div class="mb-3">
        <label for="Total" class="form-label">Total</label>
        <input type="number" class="form-control" id="Total" min="0">
      </div>

      <div class="mb-3">
        <label for="Fecha" class="form-label">Fecha de Emision</label>
        <input type="date" class="form-control" id="Fecha">
      </div>
       
      <div class="mb-3">
        <label for="Alumno" class="form-label">IdAlumno</label>
        <input type="number" class="form-control" id="Alumno">
      </div>
       

      



      <button type="button" id="registrar" class="btn btn-success">Registrar</button>
      <a href="index.html" class="btn btn-primary ms-3">Regresar</a>
    </form>
  </div>

  <script src="../js/postFacturas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
